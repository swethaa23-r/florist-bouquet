<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Stackly</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body" style="background-image: url('https://images.unsplash.com/photo-1490750967868-88cb44cb2720?auto=format&fit=crop&q=80&w=1920');">
  
  <!-- Navbar -->
  <nav class="navbar" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <img src="stackly%20logo.webp" alt="Stackly" style="height: 40px; width: auto; object-fit: contain;">
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>

        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="nav-icons">

        <a href="login.html"><i class="fa-regular fa-user" title="Account"></i></a>

        <div class="hamburger">
          <i class="fa-solid fa-bars"></i>
        </div>
      </div>
    </div>
  </nav>

  <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5);"></div>

  <div class="glass fade-up auth-card" style="padding: 40px; border-radius: var(--radius);">

    
    <h2 style="margin-bottom: 20px;">Create Account</h2>
    
    <form style="display: flex; flex-direction: column; gap: 15px;" onsubmit="handleSignup(event)">
      <input type="text" name="fullname" placeholder="Full Name" required style="padding: 15px; border-radius: 30px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.2); color: var(--color-text); outline: none;">
      <input type="email" name="email" placeholder="Email Address" required style="padding: 15px; border-radius: 30px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.2); color: var(--color-text); outline: none;">
      <input type="password" name="password" placeholder="Password" required style="padding: 15px; border-radius: 30px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.2); color: var(--color-text); outline: none;">
      <select name="role" required style="padding: 15px; border-radius: 30px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.2); color: var(--color-text); outline: none; appearance: none; cursor: pointer;">
        <option value="" disabled selected style="color: black;">Select Role</option>
        <option value="customer" style="color: black;">Customer</option>
        <option value="admin" style="color: black;">Admin</option>
      </select>
      
      <div style="display: flex; justify-content: flex-start; font-size: 0.9rem; margin-bottom: 10px; text-align: left;">
        <label style="cursor: pointer;"><input type="checkbox" style="margin-right: 5px;" required> I agree to the <a href="404.html" style="color: var(--color-primary);">Terms & Privacy Policy</a></label>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
    </form>
    
    <p style="margin-top: 20px; font-size: 0.9rem;">Already have an account? <a href="login.html" style="color: var(--color-primary); font-weight: 600;">Login</a></p>
  </div>

  <script>
    function handleSignup(e) {
      e.preventDefault();
      const email = e.target.email.value;
      const fullname = e.target.fullname.value;
      
      if (email) {
        localStorage.setItem('userEmail', email);
        const namePart = fullname ? fullname.split(' ')[0] : email.split('@')[0];
        const formattedName = namePart.charAt(0).toUpperCase() + namePart.slice(1);
        localStorage.setItem('userName', formattedName);
      }
      
      window.location.href = 'login.html';
    }
  </script>
  
  <script src="js/script.js"></script>
</body>
</html>
